services:
  - type: web
    name: swiss-side-frontend
    runtime: static
    rootDir: frontend
    # BUILD FIX: Generate Convex files before running Vite build
    buildCommand: npm install && npx convex dev --local --run "npm run build"
    staticPublishPath: dist
    
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_CONVEX_URL
        sync: false
      - key: NODE_VERSION
        value: 20.0.0

    autoDeploy: true
