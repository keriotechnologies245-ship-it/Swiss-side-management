services:
  - type: web
    name: swiss-side-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_CONVEX_URL
        value: https://usable-ant-895.convex.cloud
      - key: VITE_CONVEX_SITE_URL
        value: https://usable-ant-895.convex.site
