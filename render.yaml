services:
  - type: web
    name: swiss-side-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    
    # Static Site Routing for SPA
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_CONVEX_URL
        sync: false
      - key: NODE_VERSION
        value: 20.0.0

    autoDeploy: true
